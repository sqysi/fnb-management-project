spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fnb_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root # Thay bằng username MySQL của bạn (thường là root)
    password: # Thay bằng mật khẩu MySQL của bạn
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 'update' giúp Spring Boot tự động tạo/cập nhật bảng dựa trên Code Java
      ddl-auto: update
    show-sql: true # Hiển thị câu lệnh SQL trên console để dễ debug
    properties:
      hibernate:
        format_sql: true # Format câu lệnh SQL cho dễ nhìn
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080 # Port chạy ứng dụng
